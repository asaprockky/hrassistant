<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend visualizer - Abdulfayz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for JSON viewer */
        pre::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        pre::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        pre::-webkit-scrollbar-thumb {
            background: #4a4a4a;
            border-radius: 4px;
        }
        
        /* Syntax highlighting mock */
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        .json-null { color: #569cd6; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .dark-panel {
            background: #1e1e1e; 
            color: #d4d4d4;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex overflow-hidden font-sans">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-server text-indigo-400"></i>
                <span>Dev<span class="text-indigo-400">Specs</span></span>
            </h1>
            <p class="text-xs text-slate-400 mt-1">Backend Visualizer</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('dashboard')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-3 bg-slate-800 text-indigo-400" id="btn-dashboard">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </button>
            <button onclick="switchTab('tests')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-3" id="btn-tests">
                <i class="fa-solid fa-list-check w-5"></i> Available Tests
            </button>
            <button onclick="switchTab('active')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-3" id="btn-active">
                <i class="fa-solid fa-laptop-code w-5"></i> Active Session
            </button>
            <button onclick="switchTab('results')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-3" id="btn-results">
                <i class="fa-solid fa-history w-5"></i> Results
            </button>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold">AS</div>
                <div>
                    <p class="text-sm font-semibold">Abdulfayz Shokirov</p>
                    <p class="text-xs text-slate-400">Student / Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <!-- HEADER -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10">
            <h2 class="text-xl font-bold text-slate-700" id="page-title">Dashboard</h2>
            
            <!-- DEV MODE TOGGLE -->
            <div class="flex items-center gap-3 bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                <span class="text-xs font-bold text-slate-500 px-2 uppercase tracking-wide">Mode:</span>
                <button onclick="toggleDevMode(false)" id="mode-user" class="px-3 py-1.5 rounded bg-white shadow text-xs font-bold text-slate-700 transition-all">
                    User UI
                </button>
                <button onclick="toggleDevMode(true)" id="mode-dev" class="px-3 py-1.5 rounded hover:bg-white/50 text-xs font-bold text-slate-500 transition-all flex items-center gap-1">
                    <i class="fa-solid fa-code"></i> Backend API
                </button>
            </div>
        </header>

        <!-- SCROLLABLE CONTENT AREA -->
        <div class="flex-1 overflow-auto p-8 relative" id="content-area">
            <!-- Dynamic Content Injected Here -->
        </div>

        <!-- API INSPECTOR OVERLAY (Bottom Sheet style) -->
        <div id="inspector" class="fixed bottom-0 right-0 w-1/3 h-[calc(100vh-4rem)] bg-slate-900 border-l border-slate-700 shadow-2xl transform translate-x-full transition-transform duration-300 z-30 flex flex-col">
            <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
                <div>
                    <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider">API Inspector</span>
                    <h3 class="text-lg font-mono text-white mt-1" id="inspector-method">GET /api/...</h3>
                </div>
                <button onclick="closeInspector()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-auto p-4 space-y-6">
                <!-- Description -->
                <div>
                    <p class="text-xs font-bold text-slate-500 uppercase mb-2">Endpoint Logic</p>
                    <p class="text-slate-300 text-sm leading-relaxed" id="inspector-desc">...</p>
                </div>

                <!-- Request -->
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <p class="text-xs font-bold text-green-400 uppercase">Request Payload (Frontend sends)</p>
                        <span class="text-[10px] text-slate-500">application/json</span>
                    </div>
                    <pre class="bg-[#1e1e1e] p-3 rounded-lg border border-slate-700 text-xs font-mono overflow-x-auto" id="inspector-req">{}</pre>
                </div>

                <!-- Response -->
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <p class="text-xs font-bold text-blue-400 uppercase">Response Expected (Backend returns)</p>
                        <span class="text-[10px] text-slate-500">200 OK</span>
                    </div>
                    <pre class="bg-[#1e1e1e] p-3 rounded-lg border border-slate-700 text-xs font-mono overflow-x-auto" id="inspector-res">{}</pre>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- DATA & CONFIG ---
        
        const currentUser = {
            id: "u_8821",
            name: "Abdulfayz Shokirov",
            email: "abdulfayz@example.com"
        };

        const apiSpecs = {
            // Dashboard APIs
            fetchDashboard: {
                method: "GET",
                endpoint: "/api/v1/users/me/dashboard",
                description: "Load summary cards. Backend calculates averages from 'test_results' table.",
                request: null,
                response: {
                    activeTests: 2,
                    completedTests: 14,
                    averageScore: 84.5,
                    upcomingExams: [
                        { id: 101, title: "Advanced SQL", date: "2025-12-30" }
                    ]
                }
            },
            
            // Test Library APIs
            fetchTests: {
                method: "GET",
                endpoint: "/api/v1/tests?status=available",
                description: "Query available tests. Filter by user permissions/subscription.",
                request: null,
                response: [
                    { id: 1, title: "Python Basics", duration: 45, questionCount: 30, difficulty: "Easy" },
                    { id: 2, title: "Data Science & Pandas", duration: 90, questionCount: 50, difficulty: "Medium" },
                    { id: 3, title: "SSRS Reporting Mastery", duration: 60, questionCount: 25, difficulty: "Hard" }
                ]
            },

            // Active Test APIs
            startTest: {
                method: "POST",
                endpoint: "/api/v1/tests/{id}/start",
                description: "Initialize session. Create row in 'sessions' table, lock start_time.",
                request: { testId: 2, userId: "u_8821" },
                response: {
                    sessionId: "sess_9901",
                    startTime: "2025-12-28T10:00:00Z",
                    questions: [
                        { qId: 101, text: "What is a DataFrame?", options: ["A", "B", "C"], type: "multiple_choice" }
                    ]
                }
            },
            submitAnswer: {
                method: "POST",
                endpoint: "/api/v1/sessions/{sessionId}/answer",
                description: "Autosave answer. Upsert into 'answers' table.",
                request: { sessionId: "sess_9901", questionId: 101, selectedOption: "B" },
                response: { success: true, savedAt: "2025-12-28T10:05:00Z" }
            },
            finishTest: {
                method: "POST",
                endpoint: "/api/v1/sessions/{sessionId}/submit",
                description: "Close session. Trigger grading engine. Return final score.",
                request: { sessionId: "sess_9901" },
                response: {
                    score: 88,
                    totalQuestions: 50,
                    passed: true,
                    certificationUrl: "/certs/sess_9901.pdf"
                }
            },

            // Result APIs
            fetchResults: {
                method: "GET",
                endpoint: "/api/v1/users/me/results",
                description: "Fetch historical data for the results table.",
                request: null,
                response: [
                    { testTitle: "SQL Intermediate", score: 92, date: "2025-11-10", status: "Passed" },
                    { testTitle: "Intro to Algorithms", score: 76, date: "2025-11-15", status: "Passed" }
                ]
            },
            downloadCert: {
                method: "GET",
                endpoint: "/api/v1/certificates/{id}/download",
                description: "Generate or fetch signed PDF URL.",
                request: null,
                response: { url: "https://s3.bucket/certs/cert_123.pdf" }
            }
        };

        // --- STATE ---
        let isDevMode = false;
        let currentTab = 'dashboard';

        // --- RENDER FUNCTIONS ---

        function render() {
            const container = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            
            // Highlight Nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-indigo-400');
                btn.classList.add('text-slate-300');
            });
            document.getElementById(`btn-${currentTab}`).classList.add('bg-slate-800', 'text-indigo-400');
            document.getElementById(`btn-${currentTab}`).classList.remove('text-slate-300');

            // Render Content
            if (currentTab === 'dashboard') renderDashboard(container, title);
            else if (currentTab === 'tests') renderTests(container, title);
            else if (currentTab === 'active') renderActiveTest(container, title);
            else if (currentTab === 'results') renderResults(container, title);
        }

        // 1. DASHBOARD RENDERER
        function renderDashboard(container, title) {
            title.innerText = "Dashboard";
            const btnClass = isDevMode 
                ? "bg-slate-800 text-green-400 font-mono text-xs py-2 px-3 rounded border border-green-900 w-full text-left hover:bg-slate-900" 
                : "hidden"; // Dashboard usually loads on mount, no specific button needed for user view demo, but we show load button for dev

            container.innerHTML = `
                ${isDevMode ? `<div class="mb-6"><button onclick="inspect('fetchDashboard')" class="${btnClass}">GET /api/v1/users/me/dashboard</button></div>` : ''}
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <!-- Stat Card 1 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm font-medium text-slate-500">Average Score</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2">84.5%</h3>
                            </div>
                            <div class="p-2 bg-indigo-50 rounded-lg text-indigo-600"><i class="fa-solid fa-chart-pie"></i></div>
                        </div>
                    </div>
                    <!-- Stat Card 2 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm font-medium text-slate-500">Tests Completed</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2">14</h3>
                            </div>
                            <div class="p-2 bg-green-50 rounded-lg text-green-600"><i class="fa-solid fa-check-circle"></i></div>
                        </div>
                    </div>
                    <!-- Stat Card 3 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm font-medium text-slate-500">Active Exams</p>
                                <h3 class="text-3xl font-bold text-slate-800 mt-2">2</h3>
                            </div>
                            <div class="p-2 bg-orange-50 rounded-lg text-orange-600"><i class="fa-solid fa-clock"></i></div>
                        </div>
                    </div>
                </div>

                <h3 class="text-lg font-bold text-slate-700 mb-4">Upcoming Exams</h3>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 flex justify-between items-center hover:bg-slate-50 transition-colors cursor-pointer" onclick="isDevMode ? inspect('fetchDashboard') : null">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center font-bold">SQL</div>
                            <div>
                                <h4 class="font-semibold text-slate-800">Advanced SQL Querying</h4>
                                <p class="text-xs text-slate-500">Dec 30, 2025 • 2 Hours</p>
                            </div>
                        </div>
                        <button class="text-indigo-600 text-sm font-medium hover:underline">View Details</button>
                    </div>
                </div>
            `;
        }

        // 2. TESTS LIST RENDERER
        function renderTests(container, title) {
            title.innerText = "Available Tests";
            const apiBtn = (key) => isDevMode 
                ? `<button onclick="inspect('${key}')" class="w-full text-left font-mono text-xs text-green-400 bg-slate-900 p-2 rounded mb-2 border border-green-800 hover:bg-black transition-colors">POST ${apiSpecs[key].endpoint}</button>`
                : `<button onclick="switchTab('active')" class="w-full bg-indigo-600 text-white py-2 rounded font-medium hover:bg-indigo-700 transition-colors">Start Now</button>`;

            const loadBtn = isDevMode ? `<div class="mb-6"><button onclick="inspect('fetchTests')" class="bg-slate-800 text-blue-400 font-mono text-xs py-2 px-3 rounded border border-blue-900 w-full text-left hover:bg-slate-900">GET /api/v1/tests?status=available</button></div>` : '';

            container.innerHTML = `
                ${loadBtn}
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Test Card 1 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded uppercase">Easy</span>
                            <span class="text-slate-400 text-sm"><i class="fa-regular fa-clock"></i> 45m</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">Python Basics</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-1">Variables, Loops, Functions, and basic Data Structures.</p>
                        ${apiBtn('startTest')}
                    </div>

                    <!-- Test Card 2 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col ring-2 ring-indigo-50">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded uppercase">Medium</span>
                            <span class="text-slate-400 text-sm"><i class="fa-regular fa-clock"></i> 90m</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">Data Science & Pandas</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-1">DataFrames, Cleaning, Aggregation, and Plotting.</p>
                        ${apiBtn('startTest')}
                    </div>

                    <!-- Test Card 3 -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded uppercase">Hard</span>
                            <span class="text-slate-400 text-sm"><i class="fa-regular fa-clock"></i> 60m</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">SSRS Reporting Mastery</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-1">Advanced Layouts, Expressions, and Parameters.</p>
                        ${apiBtn('startTest')}
                    </div>
                </div>
            `;
        }

        // 3. ACTIVE TEST RENDERER
        function renderActiveTest(container, title) {
            title.innerText = "Data Science & Pandas (Session #9901)";
            
            const submitBtn = isDevMode
                ? `<button onclick="inspect('finishTest')" class="bg-red-900/20 border border-red-500 text-red-600 font-mono text-xs py-3 px-4 rounded w-full text-center hover:bg-red-900/30">POST /api/sessions/sess_9901/submit</button>`
                : `<button onclick="switchTab('results')" class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg hover:bg-indigo-700 w-full">Submit Final Exam</button>`;

            const answerBtn = (opt) => isDevMode
                ? `<button onclick="inspect('submitAnswer')" class="w-full text-left p-4 rounded-lg border border-slate-200 hover:border-green-500 hover:bg-green-50 transition-all group">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-slate-700">${opt}</span>
                        <span class="font-mono text-[10px] text-green-600 opacity-0 group-hover:opacity-100">POST /answer</span>
                    </div>
                   </button>`
                : `<button class="w-full text-left p-4 rounded-lg border border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all text-slate-700 font-medium">
                    ${opt}
                   </button>`;

            container.innerHTML = `
                <div class="flex gap-8 h-full">
                    <!-- Question Area -->
                    <div class="flex-1 flex flex-col">
                        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 flex-1">
                            <div class="mb-6 flex justify-between">
                                <span class="text-slate-400 font-medium">Question 5 of 50</span>
                                <span class="text-red-500 font-bold"><i class="fa-regular fa-clock"></i> 45:12</span>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-800 mb-8">
                                Which function is used to convert a JSON string into a Pandas DataFrame?
                            </h2>
                            
                            <div class="space-y-4">
                                ${answerBtn('A. pd.read_json()')}
                                ${answerBtn('B. pd.to_json()')}
                                ${answerBtn('C. pd.json_normalize()')}
                                ${answerBtn('D. pd.from_dict()')}
                            </div>
                        </div>
                    </div>

                    <!-- Sidebar Area -->
                    <div class="w-64 flex flex-col gap-4">
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <h4 class="font-bold text-slate-700 mb-4">Question Map</h4>
                            <div class="grid grid-cols-5 gap-2">
                                <div class="aspect-square bg-green-500 rounded text-white flex items-center justify-center text-xs font-bold">1</div>
                                <div class="aspect-square bg-green-500 rounded text-white flex items-center justify-center text-xs font-bold">2</div>
                                <div class="aspect-square bg-green-500 rounded text-white flex items-center justify-center text-xs font-bold">3</div>
                                <div class="aspect-square bg-green-500 rounded text-white flex items-center justify-center text-xs font-bold">4</div>
                                <div class="aspect-square bg-indigo-600 rounded text-white flex items-center justify-center text-xs font-bold ring-2 ring-offset-2 ring-indigo-600">5</div>
                                <div class="aspect-square bg-slate-100 rounded text-slate-400 flex items-center justify-center text-xs font-bold">6</div>
                                <!-- ... more ... -->
                            </div>
                        </div>
                        <div class="mt-auto">
                            ${submitBtn}
                        </div>
                    </div>
                </div>
            `;
        }

        // 4. RESULTS RENDERER
        function renderResults(container, title) {
            title.innerText = "My Results";
            const loadBtn = isDevMode ? `<div class="mb-6"><button onclick="inspect('fetchResults')" class="bg-slate-800 text-purple-400 font-mono text-xs py-2 px-3 rounded border border-purple-900 w-full text-left hover:bg-slate-900">GET /api/v1/users/me/results</button></div>` : '';
            
            const downloadBtn = isDevMode
                ? `<button onclick="inspect('downloadCert')" class="text-purple-400 font-mono text-xs hover:text-purple-300">GET /download</button>`
                : `<button class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center gap-1"><i class="fa-solid fa-download"></i> Certificate</button>`;

            container.innerHTML = `
                ${loadBtn}
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Test Title</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Date</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Score</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr class="hover:bg-slate-50">
                                <td class="p-4 font-medium text-slate-800">SQL Intermediate</td>
                                <td class="p-4 text-slate-500 text-sm">2025-11-10</td>
                                <td class="p-4 text-green-600 font-bold">92%</td>
                                <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Passed</span></td>
                                <td class="p-4">${downloadBtn}</td>
                            </tr>
                            <tr class="hover:bg-slate-50">
                                <td class="p-4 font-medium text-slate-800">Intro to Algorithms</td>
                                <td class="p-4 text-slate-500 text-sm">2025-11-15</td>
                                <td class="p-4 text-green-600 font-bold">76%</td>
                                <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Passed</span></td>
                                <td class="p-4">${downloadBtn}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        }


        // --- LOGIC HANDLERS ---

        function switchTab(tab) {
            currentTab = tab;
            render();
            // In mobile, we might close sidebar here
        }

        function toggleDevMode(status) {
            isDevMode = status;
            
            // Update toggle UI
            const userBtn = document.getElementById('mode-user');
            const devBtn = document.getElementById('mode-dev');
            
            if (status) {
                userBtn.classList.remove('bg-white', 'shadow', 'text-slate-700');
                userBtn.classList.add('text-slate-500', 'hover:bg-white/50');
                
                devBtn.classList.remove('text-slate-500', 'hover:bg-white/50');
                devBtn.classList.add('bg-white', 'shadow', 'text-indigo-600');
            } else {
                devBtn.classList.remove('bg-white', 'shadow', 'text-indigo-600');
                devBtn.classList.add('text-slate-500', 'hover:bg-white/50');
                
                userBtn.classList.remove('text-slate-500', 'hover:bg-white/50');
                userBtn.classList.add('bg-white', 'shadow', 'text-slate-700');
            }

            render();
        }

        function inspect(apiKey) {
            const data = apiSpecs[apiKey];
            const inspector = document.getElementById('inspector');
            const methodEl = document.getElementById('inspector-method');
            const descEl = document.getElementById('inspector-desc');
            const reqEl = document.getElementById('inspector-req');
            const resEl = document.getElementById('inspector-res');

            // Format Method Color
            let methodColor = 'text-blue-400';
            if (data.method === 'POST') methodColor = 'text-green-400';
            if (data.method === 'DELETE') methodColor = 'text-red-400';

            methodEl.innerHTML = `<span class="${methodColor} font-bold">${data.method}</span> ${data.endpoint}`;
            descEl.innerText = data.description;
            
            // Pretty Print JSON
            reqEl.innerHTML = syntaxHighlight(data.request || { note: "No body required" });
            resEl.innerHTML = syntaxHighlight(data.response);

            // Open Drawer
            inspector.classList.remove('translate-x-full');
        }

        function closeInspector() {
            document.getElementById('inspector').classList.add('translate-x-full');
        }

        // Helper to colorize JSON
        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // --- INIT ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
