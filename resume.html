<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillNova - AI Career Platform</title>
    
    <!-- Fonts: Inter for high readability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        },
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased h-screen flex overflow-hidden selection:bg-brand-200 selection:text-brand-900">

    <!-- SIDEBAR (Desktop) -->
    <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 h-full z-20 flex-none">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="flex items-center gap-2.5">
                <div class="bg-brand-600 text-white p-1.5 rounded-lg shadow-lg shadow-brand-500/40">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-gray-900">SkillNova</span>
            </div>
        </div>

        <div class="flex-1 py-6 px-3 space-y-1 overflow-y-auto">
            <div class="px-3 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Platform</div>
            
            <button onclick="app.navigate('dashboard', 'active')" id="nav-dashboard" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all text-gray-600 hover:bg-gray-50 hover:text-brand-600 group">
                <i data-lucide="layout-grid" class="w-5 h-5 group-hover:text-brand-600 transition-colors"></i>
                Dashboard
            </button>
            
            <button onclick="app.navigate('dashboard', 'history')" id="nav-history" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all text-gray-600 hover:bg-gray-50 hover:text-brand-600 group">
                <i data-lucide="file-bar-chart" class="w-5 h-5 group-hover:text-brand-600 transition-colors"></i>
                Test History
            </button>

            <div class="px-3 mt-8 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">AI Career Tools</div>
            
            <button onclick="app.navigate('profile')" id="nav-profile" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all text-gray-600 hover:bg-gray-50 hover:text-brand-600 group">
                <i data-lucide="user-circle" class="w-5 h-5 group-hover:text-brand-600 transition-colors"></i>
                My Profile & Resume
            </button>
            <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all text-gray-600 hover:bg-gray-50 hover:text-brand-600 group">
                <i data-lucide="briefcase" class="w-5 h-5 group-hover:text-brand-600 transition-colors"></i>
                Job Matching
            </button>
        </div>

        <div class="p-4 border-t border-gray-100">
            <div onclick="app.navigate('profile')" class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="User" class="w-9 h-9 rounded-full ring-2 ring-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-gray-900 truncate">Alex Morgan</p>
                    <p class="text-xs text-brand-600 font-medium truncate">Pro Member</p>
                </div>
                <button onclick="event.stopPropagation(); app.logout()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- MOBILE HEADER -->
    <header id="mobile-header" class="md:hidden fixed top-0 w-full bg-white/90 backdrop-blur border-b border-gray-200 z-30 h-16 flex items-center justify-between px-4 transition-transform duration-300">
        <div class="flex items-center gap-2">
            <div class="bg-brand-600 text-white p-1.5 rounded-lg">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-lg text-gray-900">SkillNova</span>
        </div>
        <div onclick="app.navigate('profile')" class="flex items-center gap-3 cursor-pointer">
             <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" class="w-8 h-8 rounded-full border border-gray-200">
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="app-container" class="flex-1 relative overflow-y-auto scroll-smooth w-full md:w-auto pt-16 md:pt-0 bg-gray-50/50">
        <!-- Views injected here -->
    </main>

    <!-- MODAL CONTAINER (For Test Details) -->
    <div id="modal-container" class="relative z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Background backdrop -->
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity opacity-0 fade-in" id="modal-backdrop"></div>

        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <!-- Modal panel -->
                <div class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-2xl opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95 fade-in" id="modal-panel">
                    <!-- Content Injected via JS -->
                    <div id="modal-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="mobile-nav" class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 z-30 flex justify-around items-center pb-safe-area shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="app.navigate('dashboard', 'active')" class="p-4 flex flex-col items-center gap-1 text-gray-500 hover:text-brand-600 transition-colors">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">Home</span>
        </button>
        <button onclick="app.navigate('dashboard', 'history')" class="p-4 flex flex-col items-center gap-1 text-gray-500 hover:text-brand-600 transition-colors">
            <i data-lucide="file-bar-chart" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">History</span>
        </button>
        <button onclick="app.navigate('profile')" class="p-4 flex flex-col items-center gap-1 text-gray-500 hover:text-brand-600 transition-colors">
            <i data-lucide="user-circle" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </button>
    </nav>

    <!-- TOAST -->
    <div id="toast" class="fixed top-5 right-5 transform -translate-y-20 opacity-0 transition-all duration-300 z-[60]">
        <div class="bg-gray-900 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 border border-gray-800">
            <div class="bg-green-500/20 p-1 rounded-full">
                <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
            </div>
            <span id="toast-message" class="font-medium text-sm">Notification</span>
        </div>
    </div>

    <script>
        // --- Data ---
        const MOCK_TESTS = [
            { id: 1, title: "Frontend Mastery", description: "HTML5, Advanced CSS3, and Modern JS.", duration: "15m", questionsCount: 5, difficulty: "Beginner", tags: ["Web", "UI"], image: "https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400" },
            { id: 2, title: "React Ecosystem", description: "Hooks, Redux, and Performance tuning.", duration: "25m", questionsCount: 8, difficulty: "Pro", tags: ["React", "State"], image: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?auto=format&fit=crop&q=80&w=400" },
            { id: 3, title: "System Design", description: "Scalability, Load Balancing, and DBs.", duration: "45m", questionsCount: 10, difficulty: "Expert", tags: ["Architecture"], image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&q=80&w=400" },
            { id: 4, title: "UX/UI Principles", description: "Color theory, spacing, and user flows.", duration: "20m", questionsCount: 10, difficulty: "Intermediate", tags: ["Design"], image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&q=80&w=400" }
        ];

        const HISTORY_DATA = [
            { id: 101, title: "Python Essentials", date: "Oct 12, 2023", score: 92, status: "Passed", time: "12m 45s", correct: 18, total: 20, feedback: "Excellent grasp of list comprehensions and data types. Consider exploring async/await patterns next." },
            { id: 102, title: "Agile Basics", date: "Sep 28, 2023", score: 65, status: "Failed", time: "18m 10s", correct: 13, total: 20, feedback: "Good understanding of Scrum roles, but revisit Sprint Planning mechanics. We've added a guide to your profile." },
            { id: 103, title: "React Proficiency", date: "Sep 20, 2023", score: 88, status: "Passed", time: "22m 15s", correct: 22, total: 25, feedback: "Strong component lifecycle knowledge. You are ready for the Senior React Developer role application." }
        ];

        const SAMPLE_QUESTIONS = [
            { id: 1, question: "What acts as the 'skeleton' of a webpage?", options: ["CSS", "HTML", "JavaScript", "Python"], correct: 1 },
            { id: 2, question: "Which property controls text size in CSS?", options: ["font-style", "text-size", "font-size", "text-style"], correct: 2 },
            { id: 3, question: "What represents 'absence of value' in JS?", options: ["null", "undefined", "NaN", "0"], correct: 0 },
            { id: 4, question: "Which is a CSS Framework?", options: ["React", "Laravel", "Tailwind", "Django"], correct: 2 },
            { id: 5, question: "Does 'const' variable value change?", options: ["Yes", "No", "Sometimes", "Only in loops"], correct: 1 }
        ];

        // --- Logic ---
        const app = {
            state: {
                view: 'login', // login, dashboard, profile, test, result
                dashboardTab: 'active',
                currentTest: null,
                currentQuestionIndex: 0,
                userAnswers: {},
                score: 0,
                history: HISTORY_DATA
            },

            init() {
                this.render();
                this.refreshIcons();
            },

            refreshIcons() { if (window.lucide) lucide.createIcons(); },

            navigate(view, tab = null) {
                this.state.view = view;
                if (tab) this.state.dashboardTab = tab;
                this.closeModal(); // Ensure modal is closed on nav
                this.render();
            },

            setDashboardTab(tab) {
                this.state.dashboardTab = tab;
                this.render();
            },

            login(e) {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin w-5 h-5 mx-auto"></i>`;
                this.refreshIcons();
                setTimeout(() => {
                    this.navigate('dashboard');
                    this.showToast("Welcome back, Alex!");
                }, 800);
            },

            logout() {
                this.state.view = 'login';
                this.state.currentTest = null;
                this.render();
                this.showToast("See you next time!");
            },

            startTest(testId) {
                const testMeta = MOCK_TESTS.find(t => t.id === testId);
                this.state.currentTest = { ...testMeta, questions: SAMPLE_QUESTIONS };
                this.state.currentQuestionIndex = 0;
                this.state.userAnswers = {};
                this.state.score = 0;
                this.navigate('test');
            },

            selectAnswer(qId, idx) {
                this.state.userAnswers[qId] = idx;
                this.render();
            },

            nextQuestion() {
                if (this.state.currentQuestionIndex < this.state.currentTest.questions.length - 1) {
                    this.state.currentQuestionIndex++;
                } else {
                    this.finishTest();
                }
                this.render();
            },

            prevQuestion() {
                 if (this.state.currentQuestionIndex > 0) {
                    this.state.currentQuestionIndex--;
                    this.render();
                }
            },

            finishTest() {
                let correct = 0;
                this.state.currentTest.questions.forEach(q => {
                    if (this.state.userAnswers[q.id] === q.correct) correct++;
                });
                this.state.score = Math.round((correct / this.state.currentTest.questions.length) * 100);
                
                // Add to history
                const newRecord = {
                    id: Date.now(),
                    title: this.state.currentTest.title,
                    date: "Just now",
                    score: this.state.score,
                    status: this.state.score >= 70 ? "Passed" : "Failed",
                    time: "14m 20s",
                    correct: correct,
                    total: this.state.currentTest.questions.length,
                    feedback: this.state.score >= 70 ? "Great job! Your skills are matching our Senior Dev profile." : "We recommend reviewing CSS Selectors. AI has generated a study plan for you."
                };
                this.state.history.unshift(newRecord);
                
                this.navigate('result');
            },

            showHistoryDetails(id) {
                const item = this.state.history.find(h => h.id === id);
                if (!item) return;

                const modalContainer = document.getElementById('modal-container');
                const modalContent = document.getElementById('modal-content');
                const backdrop = document.getElementById('modal-backdrop');
                const panel = document.getElementById('modal-panel');

                modalContent.innerHTML = this.views.historyModal(item);
                modalContainer.classList.remove('hidden');
                
                // Small timeout to allow display:block to apply before opacity transition
                requestAnimationFrame(() => {
                    backdrop.classList.add('opacity-100');
                    panel.classList.add('opacity-100', 'translate-y-0', 'scale-100');
                    panel.classList.remove('opacity-0', 'translate-y-4', 'scale-95');
                });
                
                this.refreshIcons();
            },

            closeModal() {
                const modalContainer = document.getElementById('modal-container');
                const backdrop = document.getElementById('modal-backdrop');
                const panel = document.getElementById('modal-panel');
                
                if (!modalContainer || modalContainer.classList.contains('hidden')) return;

                backdrop.classList.remove('opacity-100');
                panel.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
                panel.classList.add('opacity-0', 'translate-y-4', 'scale-95');

                setTimeout(() => {
                    modalContainer.classList.add('hidden');
                }, 300);
            },

            showToast(msg) {
                const toast = document.getElementById('toast');
                document.getElementById('toast-message').innerText = msg;
                toast.classList.remove('-translate-y-20', 'opacity-0');
                setTimeout(() => toast.classList.add('-translate-y-20', 'opacity-0'), 3000);
            },

            // --- Views ---
            render() {
                const container = document.getElementById('app-container');
                const sidebar = document.getElementById('sidebar');
                const mobileHeader = document.getElementById('mobile-header');
                const mobileNav = document.getElementById('mobile-nav');

                // UI Visibility Management
                const isLogin = this.state.view === 'login';
                const isTest = this.state.view === 'test';

                // Desktop Sidebar
                if (isLogin || isTest) {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('md:flex');
                } else {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('md:flex');
                }

                // Mobile Elements
                if (isLogin || isTest) {
                    mobileNav.classList.add('hidden');
                    mobileHeader.classList.add('hidden');
                    container.classList.remove('pt-16');
                } else {
                    mobileNav.classList.remove('hidden');
                    mobileHeader.classList.remove('hidden');
                    container.classList.add('pt-16');
                }

                // Highlight Sidebar
                if (!isLogin && !isTest) {
                    // Reset all
                    ['nav-dashboard', 'nav-history', 'nav-profile'].forEach(id => {
                        const el = document.getElementById(id);
                        if(el) el.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all text-gray-600 hover:bg-gray-50 hover:text-brand-600 group";
                    });

                    let activeId = '';
                    if (this.state.view === 'dashboard' && this.state.dashboardTab === 'active') activeId = 'nav-dashboard';
                    else if (this.state.view === 'dashboard' && this.state.dashboardTab === 'history') activeId = 'nav-history';
                    else if (this.state.view === 'profile') activeId = 'nav-profile';

                    const activeEl = document.getElementById(activeId);
                    if(activeEl) activeEl.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg transition-all bg-brand-50 text-brand-700 hover:bg-brand-50 group";
                }

                // Content Injection
                if (this.state.view === 'login') container.innerHTML = this.views.login();
                else if (this.state.view === 'dashboard') container.innerHTML = this.views.dashboard(this.state.dashboardTab);
                else if (this.state.view === 'profile') container.innerHTML = this.views.profile();
                else if (this.state.view === 'test') container.innerHTML = this.views.test(this.state.currentTest, this.state.currentQuestionIndex);
                else if (this.state.view === 'result') container.innerHTML = this.views.result(this.state.score);
                
                this.refreshIcons();
            },

            views: {
                login: () => `
                    <div class="min-h-screen w-full flex bg-white">
                        <div class="hidden lg:flex lg:w-1/2 bg-brand-900 relative overflow-hidden items-center justify-center p-12">
                            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80')] opacity-20 bg-cover bg-center"></div>
                            <div class="relative z-10 text-white max-w-lg">
                                <div class="w-16 h-16 bg-white/10 backdrop-blur-lg rounded-2xl flex items-center justify-center mb-8 border border-white/20">
                                    <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                                </div>
                                <h2 class="text-4xl font-bold mb-6">AI-Powered Career Growth.</h2>
                                <p class="text-brand-200 text-lg leading-relaxed">Join thousands of job seekers validating skills, building AI-enhanced resumes, and getting hired faster.</p>
                            </div>
                        </div>
                        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-16 fade-in">
                            <div class="max-w-md w-full">
                                <div class="lg:hidden mb-8 flex items-center gap-2 text-brand-600">
                                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                                    <span class="font-bold text-xl">SkillNova</span>
                                </div>
                                <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h1>
                                <p class="text-gray-500 mb-8">Sign in to access your dashboard.</p>
                                <form onsubmit="app.login(event)" class="space-y-5">
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
                                        <input type="email" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-brand-500 outline-none transition-all" value="alex@example.com">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                                        <input type="password" required class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-brand-500 outline-none transition-all" value="password">
                                    </div>
                                    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-500/25">Sign in</button>
                                </form>
                            </div>
                        </div>
                    </div>
                `,

                dashboard: (tab) => `
                    <div class="max-w-6xl mx-auto px-6 py-8 pb-24 md:pb-8 fade-in">
                        <div class="flex items-end justify-between mb-8">
                            <div>
                                <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                                <p class="text-gray-500 mt-1">Track assessments and view AI insights.</p>
                            </div>
                            <div class="hidden md:flex bg-white p-1 rounded-lg border border-gray-200 shadow-sm">
                                <button onclick="app.setDashboardTab('active')" class="px-4 py-2 text-sm font-medium rounded-md transition-all ${tab === 'active' ? 'bg-brand-50 text-brand-700' : 'text-gray-600 hover:text-gray-900'}">Available Tests</button>
                                <button onclick="app.setDashboardTab('history')" class="px-4 py-2 text-sm font-medium rounded-md transition-all ${tab === 'history' ? 'bg-brand-50 text-brand-700' : 'text-gray-600 hover:text-gray-900'}">Results History</button>
                            </div>
                        </div>

                        ${tab === 'active' ? `
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                ${MOCK_TESTS.map((test, i) => `
                                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-brand-100 transition-all duration-300 group overflow-hidden flex flex-col h-full slide-up">
                                        <div class="h-40 relative overflow-hidden">
                                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10"></div>
                                            <img src="${test.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                            <div class="absolute bottom-3 left-4 z-20">
                                                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-brand-500/90 text-white backdrop-blur-sm border border-white/20">
                                                    ${test.difficulty}
                                                </span>
                                            </div>
                                        </div>
                                        <div class="p-6 flex-1 flex flex-col">
                                            <div class="flex gap-2 mb-3 flex-wrap">
                                                ${test.tags.map(t => `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-[10px] font-bold uppercase tracking-wider rounded-md">${t}</span>`).join('')}
                                            </div>
                                            <h3 class="text-lg font-bold text-gray-900 mb-2 leading-tight">${test.title}</h3>
                                            <p class="text-sm text-gray-500 line-clamp-2 mb-4 flex-1">${test.description}</p>
                                            <div class="flex items-center justify-between pt-4 border-t border-gray-50 mt-auto">
                                                <div class="text-xs text-gray-400 font-medium flex items-center gap-1">
                                                    <i data-lucide="clock" class="w-3.5 h-3.5"></i> ${test.duration}
                                                </div>
                                                <button onclick="app.startTest(${test.id})" class="text-sm font-semibold text-brand-600 hover:text-brand-700 flex items-center gap-1 group/btn">
                                                    Start <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover/btn:translate-x-1"></i>
                                                </button>

                            </h3>
                            <button onclick="app.closeModal()" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-100 transition-colors">

                            </button>

                            </div>
                        </div>
                        <div class="w-full bg-gray-100 h-1 flex-none"><div class="bg-brand-600 h-1 transition-all duration-500 ease-out" style="width: ${progress}%"></div></div>
                        <div class="flex-1 overflow-y-auto">
                            <div class="max-w-3xl mx-auto px-6 py-12">
                                <div class="mb-10 fade-in">
                                    <span class="text-xs font-bold text-brand-600 tracking-wider uppercase mb-2 block">Question ${index + 1} of ${test.questions.length}</span>
                                    <h2 class="text-2xl md:text-3xl font-bold text-gray-900 leading-tight">${question.question}</h2>
                                </div>
                                <div class="space-y-3 fade-in">
                                    ${question.options.map((opt, i) => {
                                        const isSelected = app.state.userAnswers[question.id] === i;
                                        return `<div onclick="app.selectAnswer(${question.id}, ${i})" class="group relative p-4 md:p-5 rounded-xl border-2 cursor-pointer transition-all duration-200 ${isSelected ? 'border-brand-600 bg-brand-50/50 shadow-sm' : 'border-gray-200 hover:border-brand-300 hover:bg-gray-50'}">

                                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-none transition-colors ${isSelected ? 'border-brand-600 bg-brand-600' : 'border-gray-300 group-hover:border-brand-400'}">
                                                    ${isSelected ? '<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>' : ''}
                                                </div>
                                                <span class="text-base font-medium ${isSelected ? 'text-brand-900' : 'text-gray-700'}">${opt}</span>
                                            </div>
                                        </div>`
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="border-t border-gray-200 p-6 flex justify-between items-center bg-gray-50 flex-none">
                            <button onclick="app.prevQuestion()" class="px-6 py-2.5 text-sm font-semibold text-gray-600 hover:text-gray-900 disabled:opacity-50" ${index === 0 ? 'disabled' : ''}>Previous</button>
                            <button onclick="app.nextQuestion()" class="bg-gray-900 hover:bg-black text-white px-8 py-2.5 rounded-xl font-semibold shadow-lg shadow-gray-200 transition-all transform active:scale-95 flex items-center gap-2">
                                ${index === test.questions.length - 1 ? 'Finish' : 'Next'} <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>`
                },

                result: (score) => `
                    <div class="min-h-full flex items-center justify-center p-6 fade-in">
                        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-8 border border-gray-100 text-center relative overflow-hidden">

        app.init();
